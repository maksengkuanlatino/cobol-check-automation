name: COBOL Check Automation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cobol-check:
    runs-on: ubuntu-latest

    env:
      ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
      ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
      ZOWE_HOST:     ${{ secrets.ZOWE_HOST }}
      ZOWE_PORT:     ${{ secrets.ZOWE_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (11)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Node.js (for Zowe CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Zowe CLI
        run: |
          npm i -g @zowe/cli
          zowe --version

      - name: Verify expected repo layout
        run: |
          ls -al

      - name: Setup Mainframe Environment and Upload COBOL Check
        run: .github/scripts/zowe_operations.sh

      - name: Run COBOL Check on Mainframe
        run: .github/scripts/mainframe_operations.sh