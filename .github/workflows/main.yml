name: COBOL Check Automation
on:
  push:
    branches: [ main ]

jobs:
  cobol-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Updated to v4

      - name: Set up Java
        uses: actions/setup-java@v4 # Updated to v4
        with:
          java-version: '17'        # Use 17 for better compatibility with modern Java tools
          distribution: 'temurin'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a modern Node version

      - name: Install Zowe CLI
        run: |
          npm install -g @zowe/cli@latest    
          zowe --version # This verifies the installation worked

      - name: Setup Mainframe Environment
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          # Ensure script is executable
          chmod +x .github/scripts/zowe_operations.sh
          # Run the script
          ./.github/scripts/zowe_operations.sh
